<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator App</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1f2b;
      --button: #252c3c;
      --button-hover: #2f3850;
      --button-active: #1f2532;
      --operator: #ff8a00;
      --operator-hover: #ff9f33;
      --text: #f5f7fa;
      --muted: #98a2b3;
      --radius: 14px;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      --transition: 0.2s ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #141927 0%, var(--bg) 65%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 16px;
    }

    .calculator {
      width: min(100%, 360px);
      background: var(--panel);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .display {
      min-height: 88px;
      border-radius: 10px;
      background: #111622;
      color: var(--text);
      font-size: clamp(1.6rem, 6vw, 2.3rem);
      display: flex;
      align-items: end;
      justify-content: flex-end;
      padding: 14px;
      margin-bottom: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      color: var(--text);
      background: var(--button);
      font-size: 1.1rem;
      padding: 14px;
      cursor: pointer;
      transition: transform var(--transition), background-color var(--transition), filter var(--transition);
      min-height: 54px;
    }

    button:hover {
      background: var(--button-hover);
      filter: brightness(1.05);
    }

    button:active {
      background: var(--button-active);
      transform: scale(0.97);
    }

    button[data-type="operator"],
    button[data-type="equals"] {
      background: var(--operator);
      color: #111;
      font-weight: 700;
    }

    button[data-type="operator"]:hover,
    button[data-type="equals"]:hover {
      background: var(--operator-hover);
    }

    button[data-type="clear"] {
      color: var(--muted);
      font-weight: 700;
    }

    button[data-value="0"] {
      grid-column: span 2;
    }

    @media (max-width: 420px) {
      .calculator {
        padding: 14px;
      }

      button {
        min-height: 50px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="Calculator">
    <output class="display" aria-live="polite" aria-atomic="true" id="display">0</output>

    <section class="button-grid" aria-label="Calculator controls">
      <button type="button" data-type="clear" data-value="C">C</button>
      <button type="button" data-type="operator" data-value="/">÷</button>
      <button type="button" data-type="operator" data-value="*">×</button>
      <button type="button" data-type="operator" data-value="-">−</button>

      <button type="button" data-type="number" data-value="7">7</button>
      <button type="button" data-type="number" data-value="8">8</button>
      <button type="button" data-type="number" data-value="9">9</button>
      <button type="button" data-type="operator" data-value="+">+</button>

      <button type="button" data-type="number" data-value="4">4</button>
      <button type="button" data-type="number" data-value="5">5</button>
      <button type="button" data-type="number" data-value="6">6</button>
      <button type="button" data-type="equals" data-value="=">=</button>

      <button type="button" data-type="number" data-value="1">1</button>
      <button type="button" data-type="number" data-value="2">2</button>
      <button type="button" data-type="number" data-value="3">3</button>
      <button type="button" data-type="number" data-value=".">.</button>

      <button type="button" data-type="number" data-value="0">0</button>
    </section>
  </main>

  <script>
    const displayElement = document.getElementById('display');
    const buttons = document.querySelectorAll('button');

    // State keeps track of what the user is currently typing and the last selected operator.
    const calculatorState = {
      currentInput: '0',
      expression: '',
      previousOperator: null,
      shouldResetInput: false,
      hasError: false,
    };

    const resetState = () => {
      calculatorState.currentInput = '0';
      calculatorState.expression = '';
      calculatorState.previousOperator = null;
      calculatorState.shouldResetInput = false;
      calculatorState.hasError = false;
      updateDisplay('0');
    };

    const updateDisplay = (value = calculatorState.currentInput) => {
      displayElement.textContent = value;
    };

    const setError = (message) => {
      calculatorState.hasError = true;
      calculatorState.expression = '';
      calculatorState.previousOperator = null;
      calculatorState.shouldResetInput = true;
      updateDisplay(message);
    };

    const appendNumber = (value) => {
      if (calculatorState.hasError) {
        resetState();
      }

      if (calculatorState.shouldResetInput) {
        calculatorState.currentInput = '';
        calculatorState.shouldResetInput = false;
      }

      if (value === '.') {
        if (calculatorState.currentInput === '') {
          calculatorState.currentInput = '0';
        }

        // Prevent multiple decimal points within the same number.
        if (calculatorState.currentInput.includes('.')) {
          return;
        }
      }

      calculatorState.currentInput = calculatorState.currentInput === '0' && value !== '.'
        ? value
        : calculatorState.currentInput + value;

      updateDisplay();
    };

    const handleOperator = (operator) => {
      if (calculatorState.hasError) {
        return;
      }

      // Consecutive operator presses replace the previous operator instead of stacking invalid input.
      if (calculatorState.previousOperator && calculatorState.shouldResetInput) {
        calculatorState.expression = calculatorState.expression.slice(0, -1) + operator;
        calculatorState.previousOperator = operator;
        return;
      }

      calculatorState.expression += `${calculatorState.currentInput}${operator}`;
      calculatorState.previousOperator = operator;
      calculatorState.shouldResetInput = true;
    };

    const evaluateExpression = () => {
      if (calculatorState.hasError || calculatorState.expression === '') {
        return;
      }

      const finalExpression = calculatorState.expression + calculatorState.currentInput;

      try {
        // eval() is used intentionally for this controlled calculator input.
        // In production with untrusted input, use a proper expression parser instead.
        const result = eval(finalExpression);

        if (!Number.isFinite(result)) {
          setError('Cannot divide by zero');
          return;
        }

        calculatorState.currentInput = String(result);
        calculatorState.expression = '';
        calculatorState.previousOperator = null;
        calculatorState.shouldResetInput = true;
        updateDisplay();
      } catch (error) {
        setError('Invalid input');
      }
    };

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        const type = button.dataset.type;
        const value = button.dataset.value;

        if (type === 'clear') {
          resetState();
          return;
        }

        if (type === 'number') {
          appendNumber(value);
          return;
        }

        if (type === 'operator') {
          handleOperator(value);
          return;
        }

        if (type === 'equals') {
          evaluateExpression();
        }
      });
    });
  </script>
</body>
</html>
