<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DesignSpace – Sign In</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <!-- Three.js 3D background -->
  <canvas id="bg-canvas"></canvas>

  <!-- Auth overlay -->
  <div class="overlay" id="overlay">
    <div class="auth-container">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">🏠</div>
        <h1>DesignSpace</h1>
        <p>Reimagine your interior</p>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="login-form" novalidate>
        <h2>Welcome Back</h2>

        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div class="feedback error" id="login-error"></div>

        <button type="submit" class="btn-primary" id="login-btn">
          <span>Sign In</span>
          <div class="spinner hidden"></div>
        </button>

        <p class="switch-text">
          Don't have an account?
          <a href="#" id="show-register">Create one</a>
        </p>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="register-form" novalidate>
        <h2>Create Account</h2>

        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="johndoe" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Min. 6 characters" autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="••••••••" autocomplete="new-password" required />
        </div>

        <div class="feedback error"   id="register-error"></div>
        <div class="feedback success" id="register-success"></div>

        <button type="submit" class="btn-primary" id="register-btn">
          <span>Create Account</span>
          <div class="spinner hidden"></div>
        </button>

        <p class="switch-text">
          Already have an account?
          <a href="#" id="show-login">Sign in</a>
        </p>
      </form>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
